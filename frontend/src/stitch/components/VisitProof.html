<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Visit Proof &amp; Compliance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#dadada",
                      "on-tertiary-fixed-variant": "#e5e2e1",
                      "inverse-surface": "#2f3131",
                      "outline-variant": "#c6c6c6",
                      "on-surface": "#1a1c1c",
                      "on-tertiary-container": "#ffffff",
                      "on-primary-fixed": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-fixed-variant": "#3b3b3b",
                      "on-tertiary-fixed": "#ffffff",
                      "tertiary-container": "#757474",
                      "surface-bright": "#f9f9f9",
                      "surface-container": "#eeeeee",
                      "on-error": "#ffffff",
                      "secondary": "#5e5e5e",
                      "on-primary-container": "#ffffff",
                      "tertiary-fixed-dim": "#474746",
                      "surface-container-highest": "#e2e2e2",
                      "on-surface-variant": "#474747",
                      "primary-container": "#3b3b3b",
                      "on-secondary-container": "#1b1b1b",
                      "error-container": "#ffdad6",
                      "surface": "#f9f9f9",
                      "on-error-container": "#410002",
                      "outline": "#777777",
                      "on-tertiary": "#e5e2e1",
                      "on-primary": "#e2e2e2",
                      "primary": "#000000",
                      "surface-tint": "#5e5e5e",
                      "on-secondary": "#ffffff",
                      "error": "#ba1a1a",
                      "inverse-primary": "#c6c6c6",
                      "surface-variant": "#e2e2e2",
                      "on-secondary-fixed": "#1b1b1b",
                      "secondary-fixed": "#c6c6c6",
                      "inverse-on-surface": "#f0f1f1",
                      "secondary-container": "#d4d4d4",
                      "primary-fixed": "#5e5e5e",
                      "background": "#f9f9f9",
                      "tertiary-fixed": "#5f5e5e",
                      "surface-container-high": "#e8e8e8",
                      "surface-container-low": "#f3f3f4",
                      "primary-fixed-dim": "#474747",
                      "on-background": "#1a1c1c",
                      "secondary-fixed-dim": "#ababab",
                      "on-primary-fixed-variant": "#e2e2e2",
                      "tertiary": "#3c3b3b"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Inter"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              }
      },
          },
        }
      </script>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-8 h-20 bg-[#F9F9F9] dark:bg-[#000000] text-[#000000] dark:text-[#F9F9F9] docked full-width top-0 border-b-2 border-[#000000] dark:border-[#E2E2E2] tonal-shift-surface-container-low shadow-none no-shadows z-50 sticky">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-2xl cursor-pointer" data-icon="arrow_back">arrow_back</span>
<div class="text-2xl font-black tracking-tighter text-[#000000] dark:text-[#F9F9F9]">APNAGHR</div>
</div>
<div class="flex items-center gap-6">
<button class="font-['Inter'] font-bold tracking-tighter uppercase text-sm px-4 py-2 hover:bg-[#E2E2E2] dark:hover:bg-[#3B3B3B] transition-colors scale-102 active:scale-95 transition-transform duration-100 rounded-full">GO ONLINE</button>
<div class="flex gap-4">
<span class="material-symbols-outlined cursor-pointer hover:text-surface-tint transition-colors" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined cursor-pointer hover:text-surface-tint transition-colors" data-icon="help">help</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start w-full px-4 md:px-8 py-12 mb-32">
<div class="max-w-3xl w-full flex flex-col gap-12">
<!-- Header Section -->
<div class="flex flex-col gap-4">
<h1 class="text-[3.5rem] leading-[3.5rem] font-bold tracking-[-0.02em] font-headline text-primary">END VISIT</h1>
<p class="text-base font-body text-secondary leading-[1.6]">Upload proof and complete the mandatory compliance checklist to finalize this visit.</p>
</div>
<!-- Proof Upload Section -->
<section class="flex flex-col gap-6">
<h2 class="text-[1.5rem] font-semibold font-headline text-primary">1. VISIT PROOF</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Photo Upload -->
<div class="bg-surface-container-low rounded-sm p-8 flex flex-col items-center justify-center gap-4 border border-outline/20 hover:border-primary transition-colors cursor-pointer group min-h-[240px]">
<span class="material-symbols-outlined text-4xl text-primary opacity-50 group-hover:opacity-100 transition-opacity" data-icon="add_a_photo">add_a_photo</span>
<div class="text-center">
<h3 class="text-sm font-bold uppercase tracking-widest font-label text-primary mb-1">Property Selfie</h3>
<p class="text-xs text-secondary">Tap to capture or upload</p>
</div>
</div>
<!-- Video Upload -->
<div class="bg-surface-container-low rounded-sm p-8 flex flex-col items-center justify-center gap-4 border border-outline/20 hover:border-primary transition-colors cursor-pointer group min-h-[240px]">
<span class="material-symbols-outlined text-4xl text-primary opacity-50 group-hover:opacity-100 transition-opacity" data-icon="videocam">videocam</span>
<div class="text-center">
<h3 class="text-sm font-bold uppercase tracking-widest font-label text-primary mb-1">Property Video</h3>
<p class="text-xs text-secondary">Max 30s walk-through</p>
</div>
</div>
</div>
</section>
<div class="w-full h-px bg-outline-variant my-2"></div>
<!-- Compliance Checklist -->
<section class="flex flex-col gap-6">
<h2 class="text-[1.5rem] font-semibold font-headline text-primary">2. COMPLIANCE CHECK</h2>
<div class="flex flex-col">
<!-- Item 1 -->
<div class="flex items-center justify-between py-6 border-b border-outline-variant">
<label class="text-base font-body text-primary font-medium pr-4 cursor-pointer select-none" for="comp-1">Did the client share contact details directly with the owner?</label>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-outline-variant" id="comp-1" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-outline-variant cursor-pointer" for="comp-1"></label>
</div>
<style>
                            .toggle-checkbox:checked {
                                right: 0;
                                border-color: #000000;
                            }
                            .toggle-checkbox:checked + .toggle-label {
                                background-color: #000000;
                            }
                            .toggle-checkbox {
                                right: 0;
                                border-color: #000000;
                            }
                            .toggle-label {
                                background-color: #000000;
                            }
                        </style>
</div>
<!-- Item 2 -->
<div class="flex items-center justify-between py-6 border-b border-outline-variant">
<label class="text-base font-body text-primary font-medium pr-4 cursor-pointer select-none" for="comp-2">Was the property key secured and returned to the designated lockbox?</label>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-outline-variant" id="comp-2" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-outline-variant cursor-pointer" for="comp-2"></label>
</div>
</div>
<!-- Item 3 -->
<div class="flex items-center justify-between py-6 border-b border-outline-variant">
<label class="text-base font-body text-primary font-medium pr-4 cursor-pointer select-none" for="comp-3">Did you notice any severe damage or hazards at the property?</label>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-outline-variant" id="comp-3" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-outline-variant cursor-pointer" for="comp-3"></label>
</div>
</div>
</div>
</section>
<!-- Action Area -->
<div class="pt-8">
<button class="w-full bg-primary text-on-primary rounded-full py-6 px-12 font-bold uppercase tracking-widest text-sm hover:scale-[1.02] active:scale-[0.98] transition-transform duration-100 flex items-center justify-center gap-3">
                    COMPLETE VISIT &amp; SUBMIT
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on md, visible on mobile as this is a flow, but requirements dictate standard shell evaluation. Assuming this is a sub-page, we should technically suppress it based on Semantic Shell Mandate: "Task-Focused: Any sub-page featuring a 'Close' or 'Back' action". The top bar has a back arrow, so bottom nav is suppressed.) -->
</body></html>
