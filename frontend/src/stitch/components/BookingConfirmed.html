<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Success - APNAGHR</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#e5e2e1",
                        "on-surface": "#1a1c1c",
                        "on-tertiary-container": "#ffffff",
                        "surface-dim": "#dadada",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-fixed-variant": "#e5e2e1",
                        "error": "#ba1a1a",
                        "secondary": "#5e5e5e",
                        "primary-container": "#3b3b3b",
                        "on-secondary-fixed-variant": "#3b3b3b",
                        "tertiary-container": "#757474",
                        "secondary-fixed-dim": "#ababab",
                        "error-container": "#ffdad6",
                        "outline": "#777777",
                        "surface-container": "#eeeeee",
                        "on-secondary-container": "#1b1b1b",
                        "secondary-fixed": "#c6c6c6",
                        "on-error": "#ffffff",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-fixed-dim": "#474746",
                        "background": "#f9f9f9",
                        "on-surface-variant": "#474747",
                        "outline-variant": "#c6c6c6",
                        "inverse-on-surface": "#f0f1f1",
                        "on-error-container": "#410002",
                        "on-primary-fixed": "#ffffff",
                        "tertiary": "#3c3b3b",
                        "surface-variant": "#e2e2e2",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary": "#e2e2e2",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d4d4d4",
                        "inverse-surface": "#2f3131",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "primary-fixed": "#5e5e5e",
                        "surface-bright": "#f9f9f9",
                        "surface-container-low": "#f3f3f4",
                        "primary-fixed-dim": "#474747",
                        "on-primary-container": "#ffffff",
                        "surface": "#f9f9f9",
                        "primary": "#000000",
                        "on-secondary-fixed": "#1b1b1b",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "tertiary-fixed": "#5f5e5e",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-fixed": "#ffffff"
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        lg: "2rem",
                        xl: "3rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-6 md:p-12">
<!-- Transactional Page: No Global Nav / Bottom Nav per Guidelines -->
<main class="w-full max-w-2xl mx-auto flex flex-col items-center">
<!-- Status Icon -->
<div class="mb-12 flex items-center justify-center w-32 h-32 bg-primary rounded-full">
<span class="material-symbols-outlined text-[64px] text-on-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Headline -->
<div class="text-center mb-16 w-full">
<h1 class="text-[3.5rem] font-bold tracking-[-0.02em] leading-none mb-4 text-primary">Payment Verified</h1>
<p class="text-[1rem] font-normal leading-[1.6] text-on-surface-variant max-w-md mx-auto">Your transaction has been securely processed. Our logistics team has been notified.</p>
</div>
<!-- Booking Summary Card (Borderless Container, Tonal Shift) -->
<div class="w-full bg-surface-container-low rounded-lg p-8 md:p-12 mb-16 flex flex-col gap-6">
<div class="flex justify-between items-center border-b border-outline-variant pb-6">
<span class="text-[0.75rem] font-bold uppercase tracking-widest text-outline">Package</span>
<span class="text-[1rem] font-semibold text-primary">Priority Visit</span>
</div>
<div class="flex justify-between items-center border-b border-outline-variant pb-6">
<span class="text-[0.75rem] font-bold uppercase tracking-widest text-outline">Schedule</span>
<span class="text-[1rem] font-semibold text-primary">Oct 24, 2024 / 14:00</span>
</div>
<div class="flex justify-between items-center border-b border-outline-variant pb-6">
<span class="text-[0.75rem] font-bold uppercase tracking-widest text-outline">Location ID</span>
<span class="text-[1rem] font-semibold text-primary">BOM-4A-992</span>
</div>
<div class="flex justify-between items-center pt-2">
<span class="text-[0.75rem] font-bold uppercase tracking-widest text-outline">Total Settled</span>
<span class="text-[1.5rem] font-bold text-primary tracking-tight">₹2,450.00</span>
</div>
</div>
<!-- Action Area (Massive Solid Buttons) -->
<div class="w-full flex flex-col md:flex-row gap-6 justify-center">
<a class="flex items-center justify-center bg-primary text-on-primary rounded-full px-12 py-6 text-[1rem] font-bold hover:scale-[1.02] active:scale-95 transition-transform w-full md:w-auto text-center" href="#">
<span class="material-symbols-outlined mr-3" style="font-variation-settings: 'FILL' 1;">location_on</span>
                View Live Tracker
            </a>
<a class="flex items-center justify-center bg-surface-container-highest text-on-surface rounded-full px-12 py-6 text-[1rem] font-bold hover:bg-outline-variant transition-colors w-full md:w-auto text-center" href="#">
                Go to Dashboard
            </a>
</div>
</main>
</body></html>
